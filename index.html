<body>

<div id="header"></div>

<div class="container">
  <div class="main">
    
    <div class="title" id="videoTitle">Select a video</div>
    <div class="description" id="videoDescription">Desi Big Boobs</div>

    <div class="latest-videos">
      <h2>Latest Videos 2026</h2>
      <div class="latest-grid" id="latestGrid"></div>
      <div id="pagination"></div>
    </div>
  </div>

  <div class="sidebar" id="playlist"></div>
</div>

<div id="footer"></div>

<!-- External videos.js -->
<script src="videos.js"></script>

<script>
const player = document.getElementById("player");
const title = document.getElementById("videoTitle");
const description = document.getElementById("videoDescription");
const playlist = document.getElementById("playlist");
const latestGrid = document.getElementById("latestGrid");
const pagination = document.getElementById("pagination");

let currentPage = 1;
const videosPerPage = 6;

function loadVideo(video, itemDiv){
  player.src = video.src;
  title.innerText = video.title;
  description.innerText = video.description;

  document.querySelectorAll('.video-item').forEach(v=>v.classList.remove('active'));
  if(itemDiv) itemDiv.classList.add('active');
}

/* Sidebar Playlist */
playlist.innerHTML = "";
videos.forEach(video=>{
  const div = document.createElement('div');
  div.className = 'video-item';
  div.innerHTML = `
    <div class="thumb-wrapper">
      <iframe src="${video.src}"></iframe>
      <div class="thumb-overlay"></div>
      <div class="play-btn"></div>
    </div>
    <div class="video-info">${video.title}</div>
  `;
  div.onclick = ()=>loadVideo(video, div);
  playlist.appendChild(div);
});

/* Latest Videos with Pagination */
function showLatestVideos(){
  latestGrid.innerHTML = "";

  const start = (currentPage-1) * videosPerPage;
  const end = start + videosPerPage;

  const pageVideos = videos.slice().reverse().slice(start,end);

  pageVideos.forEach((video, index)=>{
    const div = document.createElement('div');
    div.className = 'latest-item';

    div.innerHTML = `
      <iframe src="${video.src}"></iframe>
      <div class="latest-title">${video.title}</div>
    `;

    div.onclick = ()=>{
      window.location.href = "video.html?id=" + index;
    };

    latestGrid.appendChild(div); // ✅ loop এর ভিতরে
  });

  renderPagination();
}

function renderPagination(){
  pagination.innerHTML = "";
  const totalPages = Math.ceil(videos.length / videosPerPage);
  for(let i=1;i<=totalPages;i++){
    const btn = document.createElement('button');
    btn.innerText = i;
    btn.className = (i===currentPage)?"active":"";
    btn.onclick = ()=>{currentPage=i; showLatestVideos();}
    pagination.appendChild(btn);
  }
}

/* Initial load */
showLatestVideos();
loadVideo(videos[0], playlist.firstChild);

function loadComponent(id, file){
  fetch(file)
    .then(res => res.text())
    .then(data => {
      document.getElementById(id).innerHTML = data;
    });
}

// load header & footer
loadComponent("header", "header.html");
loadComponent("footer", "footer.html");

</script>
