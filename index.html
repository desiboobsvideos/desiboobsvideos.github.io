<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Drive Video Site</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  display: flex;
  flex-wrap: wrap;
}

/* MAIN PLAYER */
.main {
  flex: 2;
  padding: 10px;
}

.player-wrapper {
  position: relative;
}

iframe {
  width: 100%;
  height: 450px;
  border: none;
  border-radius: 10px;
}

/* VIDEO TITLE */
.title {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
}

/* PLAYLIST */
.sidebar {
  flex: 1;
  max-height: 100vh;
  overflow-y: auto;
  border-left: 1px solid #333;
}

.video-item {
  position: relative;
  display: flex;
  gap: 10px;
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #222;
}

.video-item:hover {
  background: #1f1f1f;
}

/* THUMBNAIL OVERLAY TRICK */
.thumb-wrapper {
  position: relative;
  width: 120px;
  height: 70px;
  border-radius: 5px;
  overflow: hidden;
  flex-shrink: 0;
}

.thumb-wrapper iframe {
  width: 100%;
  height: 100%;
  pointer-events: none; /* Disable click on iframe */
}

.thumb-overlay {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.3); /* optional dark overlay */
  pointer-events: none; /* click pass to parent div */
}

.video-info {
  font-size: 14px;
  display: flex;
  align-items: center;
}

/* MOBILE */
@media(max-width:768px){
  .container {
    flex-direction: column;
  }
  iframe {
    height: 220px;
  }
  .thumb-wrapper {
    width: 80px;
    height: 50px;
  }
}
</style>
</head>
<body>

<div class="container">

  <!-- MAIN PLAYER -->
  <div class="main">
    <div class="player-wrapper">
      <iframe id="player" src="" allow="autoplay"></iframe>
    </div>
    <div class="title" id="videoTitle">Select a video</div>
  </div>

  <!-- PLAYLIST -->
  <div class="sidebar" id="playlist"></div>

</div>

<script>
// Google Drive preview links
const videos = [
  {
    title: "Video 1",
    src: "https://drive.google.com/file/d/1SXyn2XZUv8KRfnr9IdhtOxssmz-ZEG6p/preview"
  },
  {
    title: "Video 2",
    src: "https://drive.google.com/file/d/FILE_ID_2/preview"
  },
  {
    title: "Video 3",
    src: "https://drive.google.com/file/d/FILE_ID_3/preview"
  }
];

const player = document.getElementById("player");
const title = document.getElementById("videoTitle");
const playlist = document.getElementById("playlist");

// Load video into main iframe
function loadVideo(video){
  player.src = video.src;
  title.innerText = video.title;
}

// Create playlist with thumbnail iframe overlay
videos.forEach(video => {
  const div = document.createElement("div");
  div.className = "video-item";

  div.innerHTML = `
    <div class="thumb-wrapper">
      <iframe src="${video.src}"></iframe>
      <div class="thumb-overlay"></div>
    </div>
    <div class="video-info">${video.title}</div>
  `;

  // Click on parent div loads video in main player
  div.onclick = () => loadVideo(video);

  playlist.appendChild(div);
});

// Load first video by default
loadVideo(videos[0]);

</script>
</body>
</html>
